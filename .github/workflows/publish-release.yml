# Publishes all ForgeNav library modules to Maven Central staging, then
# transfers them to the Central Portal for final Publish.
#
# Triggers:
#   - Push of tags matching v* (e.g. v1.0.0)
#   - Manual workflow_dispatch with a tag input
#
# Artifacts:
#   studio.forgenav:forgenv-core
#   studio.forgenav:forgenv-compose
#   studio.forgenav:forgenv-syncforge
#   studio.forgenav:forgenv-testing
#   (+ KMP platform variants: android, jvm, ios*, metadata)
#
# Secrets required: MAVEN_CENTRAL_USERNAME, MAVEN_CENTRAL_PASSWORD,
#   SIGNING_IN_MEMORY_KEY_B64 (or SIGNING_IN_MEMORY_KEY), optional KEY_ID / PASSWORD

name: Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g. v1.0.0). Leave empty to use the default tag name."
        required: false
        default: "v1.1.0"

permissions:
  contents: read

concurrency:
  group: publish-maven-central
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            TAG="${TAG:-v1.1.0}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$ ]]; then
            echo "::error::Tag must look like v1.0.0 (got: $TAG)"
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing tag=${TAG} version=${VERSION}"

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ steps.tag.outputs.tag }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Set release version from tag
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          if grep -q '^forgenav\.version=' gradle.properties; then
            sed -i.bak "s/^forgenav\.version=.*/forgenav.version=${VERSION}/" gradle.properties
          else
            echo "forgenav.version=${VERSION}" >> gradle.properties
          fi
          echo "forgenav.group=$(grep '^forgenav.group=' gradle.properties | cut -d= -f2-)"
          echo "forgenav.version=$(grep '^forgenav.version=' gradle.properties | cut -d= -f2-)"
          echo "Publishing studio.forgenav:*:${VERSION}"

      - name: Validate release (JVM tests + Android/JVM compile)
        run: ./gradlew verifyReleaseSignOff --no-daemon

      - name: Compile iOS simulator targets
        run: |
          ./gradlew \
            :forgenv-core:compileKotlinIosSimulatorArm64 \
            :forgenv-compose:compileKotlinIosSimulatorArm64 \
            :forgenv-syncforge:compileKotlinIosSimulatorArm64 \
            :forgenv-testing:compileKotlinIosSimulatorArm64 \
            --no-daemon

      - name: List Maven publications to upload
        run: |
          echo "=== Expected modules ==="
          echo "  forgenv-core, forgenv-compose, forgenv-syncforge, forgenv-testing"
          echo "=== Publication tasks (MavenCentral repository) ==="
          ./gradlew tasks --all -PmavenCentralPublishing=true --no-daemon 2>/dev/null \
            | grep -E 'publish.*ToMavenCentralRepository' || true

      - name: Drop open staging repositories
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          FINALIZE_CURRENT_IP: "false"
          DROP_ALL_OPEN_STAGING: "true"
          DROP_INVALID_ON_FAILURE: "true"
        run: ./gradlew finalizeMavenCentralStaging -PmavenCentralNamespace=studio.forgenav --no-daemon

      - name: Prepare GPG signing key
        env:
          SIGNING_IN_MEMORY_KEY: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          SIGNING_IN_MEMORY_KEY_B64: ${{ secrets.SIGNING_IN_MEMORY_KEY_B64 }}
          SIGNING_IN_MEMORY_KEY_ID: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
          SIGNING_IN_MEMORY_KEY_PASSWORD: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          KEY_FILE_ARMOR="${RUNNER_TEMP}/gpg-signing-key.asc"
          KEY_FILE="${RUNNER_TEMP}/gpg-signing-key.gpg"
          if [ -n "${SIGNING_IN_MEMORY_KEY_B64:-}" ]; then
            echo "Using SIGNING_IN_MEMORY_KEY_B64"
            printf '%s' "$SIGNING_IN_MEMORY_KEY_B64" | base64 --decode > "$KEY_FILE_ARMOR"
          elif [ -n "${SIGNING_IN_MEMORY_KEY:-}" ]; then
            echo "Using SIGNING_IN_MEMORY_KEY"
            printf '%s\n' "$SIGNING_IN_MEMORY_KEY" > "$KEY_FILE_ARMOR"
          else
            echo "::error::No signing key secret found on this repository."
            echo "Add SIGNING_IN_MEMORY_KEY_B64 (recommended) or SIGNING_IN_MEMORY_KEY at:"
            echo "https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          if ! grep -q "BEGIN PGP PRIVATE KEY BLOCK" "$KEY_FILE_ARMOR"; then
            echo "::error::Signing key file is not an armored PGP private key"
            exit 1
          fi
          gpg --batch --yes --dearmor -o "$KEY_FILE" < "$KEY_FILE_ARMOR"
          GNUPGHOME="$(mktemp -d)"
          chmod 700 "$GNUPGHOME"
          export GNUPGHOME
          gpg --batch --import "$KEY_FILE_ARMOR"
          KEY_ID="$(gpg --list-secret-keys --keyid-format long 2>/dev/null | awk '/^sec/ {split($2, parts, "/"); print parts[2]; exit}')"
          KEY_ID="${KEY_ID: -8}"
          if [ -n "${SIGNING_IN_MEMORY_KEY_ID:-}" ] && echo "${SIGNING_IN_MEMORY_KEY_ID}" | grep -qE '^[0-9A-Fa-f]{8}$'; then
            KEY_ID="${SIGNING_IN_MEMORY_KEY_ID}"
          fi
          if ! echo "$KEY_ID" | grep -qE '^[0-9A-Fa-f]{8}$'; then
            echo "::error::Could not derive a valid 8-char GPG key id. Set SIGNING_IN_MEMORY_KEY_ID."
            exit 1
          fi
          echo "Signing key ready (keyId=${KEY_ID})"
          {
            echo "ORG_GRADLE_PROJECT_signing_secretKeyRingFile=${KEY_FILE}"
            echo "ORG_GRADLE_PROJECT_signing_keyId=${KEY_ID}"
          } >> "$GITHUB_ENV"
          {
            echo "signing.secretKeyRingFile=${KEY_FILE}"
            echo "signing.keyId=${KEY_ID}"
          } >> gradle.properties
          if [ -n "${SIGNING_IN_MEMORY_KEY_PASSWORD:-}" ]; then
            echo "ORG_GRADLE_PROJECT_signing_password=${SIGNING_IN_MEMORY_KEY_PASSWORD}" >> "$GITHUB_ENV"
            echo "signing.password=${SIGNING_IN_MEMORY_KEY_PASSWORD}" >> gradle.properties
          fi

      - name: Publish all modules to Maven Central staging
        env:
          ORG_GRADLE_PROJECT_mavenCentralPublishing: "true"
          ORG_GRADLE_PROJECT_signAllPublications: "true"
          ORG_GRADLE_PROJECT_org.gradle.parallel: "false"
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          set -euo pipefail
          KEY_FILE="${RUNNER_TEMP}/gpg-signing-key.gpg"
          KEY_ID="$(grep '^signing.keyId=' gradle.properties | tail -1 | cut -d= -f2-)"
          if [ ! -f "$KEY_FILE" ] || [ -z "$KEY_ID" ]; then
            echo "::error::Signing key missing — Prepare GPG signing key step may have failed"
            exit 1
          fi
          SIGNING_ARGS=(
            "-Psigning.secretKeyRingFile=${KEY_FILE}"
            "-Psigning.keyId=${KEY_ID}"
          )
          if grep -q '^signing.password=' gradle.properties; then
            SIGNING_PASSWORD="$(grep '^signing.password=' gradle.properties | tail -1 | cut -d= -f2-)"
            SIGNING_ARGS+=("-Psigning.password=${SIGNING_PASSWORD}")
          fi
          # Publishes every KMP/Android/JVM publication for:
          #   :forgenv-core :forgenv-compose :forgenv-syncforge :forgenv-testing
          ./gradlew verifyPublishSigning publishAllToMavenCentral \
            --no-daemon --no-parallel "${SIGNING_ARGS[@]}"

      - name: Transfer staging upload to Central Portal
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          FINALIZE_CURRENT_IP: "true"
          DROP_INVALID_ON_FAILURE: "true"
        run: ./gradlew finalizeMavenCentralStaging -PmavenCentralNamespace=studio.forgenav --no-daemon

      - name: Post-publish notice
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          echo "::notice title=Maven Central portal::Open Central Portal → Deployments. Publish every VALIDATED deployment for studio.forgenav."
          echo "::notice title=Artifacts::studio.forgenav:forgenv-core:${VERSION}, forgenv-compose, forgenv-syncforge, forgenv-testing (+ platform variants)."
          echo "::notice title=After Central sync::./gradlew verifyMavenCentralArtifacts -PverifyMavenCentralVersion=${VERSION}"
          echo "::notice title=GitHub Release::Optional: create a Release for tag ${{ steps.tag.outputs.tag }} in the UI."
